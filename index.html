<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenWealth — Educação Financeira, ESG e Inteligência Artificial</title>

<link rel="canonical" href="https://www.greenwealth.com.br/index.html">
<meta property="og:title" content="GreenWealth — Educação Financeira, ESG e Inteligência Artificial">
<meta property="og:description" content="Portal de educação financeira com artigos originais sobre finanças pessoais, ESG, finanças sustentáveis e inteligência artificial.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --dark-green:#0B3D2E; --mid-green:#1E7A4A; --light-green:#5FBF72;
  --gold:#D8C27A; --white:#FFFFFF; --cream:#F6F4EC; --ink:#0C241C;
  --ink-soft:#4B5E56; --line:#E4E1D4;
  --shadow-sm:0 2px 10px rgba(11,61,46,.06); --shadow-md:0 14px 40px rgba(11,61,46,.10);
  --shadow-lg:0 24px 60px rgba(11,61,46,.16);
  --radius:20px; --radius-sm:12px;
  --ff-display:'Montserrat',sans-serif; --ff-body:'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;scroll-behavior:auto !important;}}
body{font-family:var(--ff-body);color:var(--ink);background:var(--white);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img,svg{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
button{font-family:inherit;cursor:pointer;border:none;}
h1,h2,h3,h4{font-family:var(--ff-display);color:var(--dark-green);letter-spacing:-0.01em;}
.container{max-width:1200px;margin:0 auto;padding:0 32px;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid-green);margin-bottom:14px;}
.eyebrow::before{content:'';width:22px;height:2px;background:var(--gold);display:inline-block;border-radius:2px;}
.section{padding:100px 0;}
.section-cream{background:var(--cream);}
.section-head{max-width:640px;margin-bottom:52px;}
.section-head.center{margin-left:auto;margin-right:auto;text-align:center;}
.section-head h2{font-size:clamp(28px,3.6vw,40px);font-weight:700;line-height:1.15;}
.section-head p{margin-top:16px;font-size:17px;color:var(--ink-soft);font-weight:300;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 28px;border-radius:100px;font-weight:600;font-size:15px;transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s,background .35s,color .35s,border-color .35s;white-space:nowrap;}
.btn-primary{background:var(--dark-green);color:var(--white);box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:var(--mid-green);transform:translateY(-3px);box-shadow:var(--shadow-md);}
.btn-gold{background:var(--gold);color:var(--dark-green);box-shadow:var(--shadow-sm);}
.btn-gold:hover{background:#c9b269;transform:translateY(-3px);box-shadow:var(--shadow-md);}
.btn-ghost{background:transparent;color:var(--dark-green);border:1.5px solid var(--dark-green);}
.btn-ghost:hover{background:var(--dark-green);color:var(--white);transform:translateY(-3px);}
.btn-sm{padding:11px 20px;font-size:13.5px;}
/* header */
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 0;transition:background .4s ease,box-shadow .4s ease,padding .4s ease;background:rgba(255,255,255,.0);}
header.solid, header.scrolled{background:rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 6px 24px rgba(11,61,46,.08);padding:12px 0;}
.nav-wrap{display:flex;align-items:center;justify-content:space-between;gap:24px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:42px;width:auto;}
nav.menu{display:flex;align-items:center;gap:34px;}
nav.menu a{font-weight:500;font-size:14.5px;color:var(--ink);position:relative;padding:4px 0;}
nav.menu a.active{color:var(--mid-green);font-weight:600;}
nav.menu a::after{content:'';position:absolute;left:0;bottom:-2px;width:0;height:2px;background:var(--gold);transition:width .3s ease;}
nav.menu a:hover::after{width:100%;}
.header-right{display:flex;align-items:center;gap:18px;}
.burger{display:none;flex-direction:column;gap:5px;width:26px;z-index:120;}
.burger span{height:2px;background:var(--dark-green);border-radius:2px;transition:.3s;}
/* reveal */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1;transform:translateY(0);}
.stagger .reveal:nth-child(1){transition-delay:.05s;} .stagger .reveal:nth-child(2){transition-delay:.12s;}
.stagger .reveal:nth-child(3){transition-delay:.19s;} .stagger .reveal:nth-child(4){transition-delay:.26s;}
/* benefit cards */
.cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.benefit-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:32px 24px;box-shadow:var(--shadow-sm);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;}
.benefit-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);border-color:transparent;}
.icon-badge{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--mid-green),var(--dark-green));margin-bottom:18px;}
.icon-badge svg{width:23px;height:23px;stroke:var(--white);fill:none;}
.benefit-card h3{font-size:17.5px;font-weight:700;margin-bottom:9px;}
.benefit-card p{color:var(--ink-soft);font-size:14.5px;font-weight:300;}
/* blog cards */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.blog-card{border-radius:var(--radius);overflow:hidden;background:var(--white);border:1px solid var(--line);box-shadow:var(--shadow-sm);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;display:flex;flex-direction:column;}
.blog-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);}
.blog-thumb{aspect-ratio:16/10;width:100%;}
.blog-body{padding:24px 22px 26px;display:flex;flex-direction:column;flex:1;}
.tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mid-green);background:rgba(30,122,74,.08);padding:5px 12px;border-radius:100px;}
.meta-row{display:flex;align-items:center;gap:10px;margin:14px 0 12px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;}
.meta-row .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft);}
.blog-body h3{font-size:18.5px;font-weight:700;line-height:1.35;margin-bottom:10px;}
.blog-body p.excerpt{color:var(--ink-soft);font-size:14px;font-weight:300;margin-bottom:18px;flex:1;}
.read-link{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:var(--dark-green);}
.read-link svg{width:15px;height:15px;transition:transform .3s;}
.blog-card:hover .read-link svg{transform:translateX(5px);}
.section-cta-row{display:flex;justify-content:center;margin-top:46px;}
/* about */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.about-copy p{color:var(--ink-soft);font-size:17px;font-weight:300;margin-bottom:18px;}
.about-pillars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px;}
.pillar{display:flex;gap:12px;align-items:flex-start;}
.pillar svg{width:20px;height:20px;stroke:var(--mid-green);flex-shrink:0;margin-top:2px;}
.pillar span{font-size:14px;font-weight:500;color:var(--dark-green);}
.about-art{border-radius:var(--radius);overflow:hidden;aspect-ratio:1/1;}
/* newsletter */
.newsletter{background:linear-gradient(120deg,var(--dark-green),#0F4C38 60%,var(--mid-green));border-radius:28px;padding:64px 56px;position:relative;overflow:hidden;display:grid;grid-template-columns:1.1fr .9fr;gap:36px;align-items:center;}
.newsletter::before{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(216,194,122,.20),transparent 70%);top:-140px;right:-100px;}
.newsletter h2{color:var(--white);font-size:clamp(24px,3.2vw,34px);font-weight:700;position:relative;}
.newsletter p{color:rgba(255,255,255,.78);margin-top:12px;font-weight:300;font-size:15px;max-width:420px;position:relative;}
.newsletter-form{position:relative;display:flex;gap:12px;flex-wrap:wrap;}
.newsletter-form input{flex:1;min-width:210px;padding:15px 20px;border-radius:100px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08);color:var(--white);font-family:var(--ff-body);font-size:14.5px;}
.newsletter-form input::placeholder{color:rgba(255,255,255,.6);}
.newsletter-form input:focus{outline:2px solid var(--gold);outline-offset:2px;background:rgba(255,255,255,.14);}
/* footer */
footer{background:#082A20;color:rgba(255,255,255,.72);padding-top:70px;}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,.1);}
.footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.footer-logo img{height:34px;filter:brightness(0) invert(1);opacity:.95;}
.footer-col h4{color:var(--white);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;}
.footer-col ul li{margin-bottom:11px;}
.footer-col a{font-size:14px;color:rgba(255,255,255,.68);transition:color .25s;}
.footer-col a:hover{color:var(--gold);}
.footer-desc{font-size:14px;color:rgba(255,255,255,.6);max-width:280px;font-weight:300;}
.social-row{display:flex;gap:12px;margin-top:18px;}
.social-row a{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;transition:background .25s;}
.social-row a:hover{background:var(--mid-green);}
.social-row svg{width:16px;height:16px;stroke:var(--white);fill:none;}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding:24px 0;font-size:13px;color:rgba(255,255,255,.5);flex-wrap:wrap;gap:12px;}
.footer-legal{display:flex;gap:22px;}
.footer-legal a{color:rgba(255,255,255,.5);}
.footer-legal a:hover{color:var(--gold);}
/* article page */
.article-hero{padding:170px 0 50px;background:linear-gradient(180deg,#FFFFFF 0%,#FBFAF5 100%);}
.article-hero .container{max-width:820px;}
.breadcrumb{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
.breadcrumb a{color:var(--mid-green);font-weight:500;}
.article-hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.18;margin:14px 0 20px;}
.article-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13.5px;color:var(--ink-soft);align-items:center;}
.article-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft);}
.article-cover{max-width:820px;margin:36px auto 0;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/8;}
.article-body-wrap{padding:56px 0 100px;}
.article-body-wrap .container{max-width:760px;}
.prose h2{font-size:26px;font-weight:700;margin:42px 0 16px;}
.prose h3{font-size:19px;font-weight:700;margin:28px 0 12px;color:var(--mid-green);}
.prose p{font-size:16.5px;color:var(--ink-soft);margin-bottom:18px;font-weight:300;}
.prose ul{margin:0 0 20px 0;}
.prose li{font-size:16px;color:var(--ink-soft);margin-bottom:10px;padding-left:26px;position:relative;font-weight:300;}
.prose li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;background:var(--light-green);}
.callout{background:var(--cream);border-left:3px solid var(--gold);border-radius:12px;padding:20px 24px;margin:26px 0;font-size:15px;color:var(--dark-green);font-weight:500;}
.faq-block{margin-top:16px;border-top:1px solid var(--line);}
.faq-item{border-bottom:1px solid var(--line);}
.faq-q{width:100%;text-align:left;padding:20px 4px;display:flex;justify-content:space-between;align-items:center;gap:16px;background:none;font-family:var(--ff-display);font-weight:600;font-size:15.5px;color:var(--dark-green);}
.faq-q svg{width:18px;height:18px;flex-shrink:0;transition:transform .3s;stroke:var(--mid-green);}
.faq-item.open .faq-q svg{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.faq-item.open .faq-a{max-height:400px;}
.faq-a p{padding:0 4px 20px;font-size:15px;color:var(--ink-soft);font-weight:300;}
.article-cta{background:var(--dark-green);border-radius:var(--radius);padding:36px 32px;margin-top:56px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;}
.article-cta h4{color:var(--white);font-size:19px;margin-bottom:6px;}
.article-cta p{color:rgba(255,255,255,.7);font-size:14px;font-weight:300;}
.author-box{display:flex;align-items:center;gap:14px;margin-top:50px;padding-top:30px;border-top:1px solid var(--line);}
.author-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--mid-green),var(--dark-green));display:flex;align-items:center;justify-content:center;color:var(--white);font-family:var(--ff-display);font-weight:700;flex-shrink:0;}
.author-box b{font-size:14.5px;color:var(--dark-green);display:block;}
.author-box span{font-size:13px;color:var(--ink-soft);}
/* responsive */
@media (max-width:1024px){
  .cards-4{grid-template-columns:repeat(2,1fr);}
  .blog-grid{grid-template-columns:repeat(2,1fr);}
  .about-grid{grid-template-columns:1fr;}
  .about-art{order:-1;max-width:440px;margin:0 auto;}
  .footer-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:760px){
  .section{padding:70px 0;}
  nav.menu{position:fixed;inset:0;top:0;background:var(--dark-green);flex-direction:column;justify-content:center;align-items:center;gap:32px;transform:translateX(100%);transition:transform .45s cubic-bezier(.2,.8,.2,1);z-index:110;}
  nav.menu.open{transform:translateX(0);}
  nav.menu a{color:var(--white);font-size:19px;}
  nav.menu a.active{color:var(--gold);}
  .header-right .btn{display:none;}
  .burger{display:flex;}
  .cards-4, .blog-grid{grid-template-columns:1fr;}
  .newsletter{grid-template-columns:1fr;padding:40px 24px;}
  .footer-grid{grid-template-columns:1fr 1fr;gap:28px;}
  .container{padding:0 22px;}
  .article-hero{padding-top:140px;}
  .article-cta{flex-direction:column;align-items:flex-start;}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
</style>

</head>

<style>
:root{
  --dark-green:#0B3D2E; --mid-green:#1E7A4A; --light-green:#5FBF72;
  --gold:#D8C27A; --white:#FFFFFF; --cream:#F6F4EC; --ink:#0C241C;
  --ink-soft:#4B5E56; --line:#E4E1D4;
  --shadow-sm:0 2px 10px rgba(11,61,46,.06); --shadow-md:0 14px 40px rgba(11,61,46,.10);
  --shadow-lg:0 24px 60px rgba(11,61,46,.16);
  --radius:20px; --radius-sm:12px;
  --ff-display:'Montserrat',sans-serif; --ff-body:'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;scroll-behavior:auto !important;}}
body{font-family:var(--ff-body);color:var(--ink);background:var(--white);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img,svg{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
button{font-family:inherit;cursor:pointer;border:none;}
h1,h2,h3,h4{font-family:var(--ff-display);color:var(--dark-green);letter-spacing:-0.01em;}
.container{max-width:1200px;margin:0 auto;padding:0 32px;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid-green);margin-bottom:14px;}
.eyebrow::before{content:'';width:22px;height:2px;background:var(--gold);display:inline-block;border-radius:2px;}
.section{padding:100px 0;}
.section-cream{background:var(--cream);}
.section-head{max-width:640px;margin-bottom:52px;}
.section-head.center{margin-left:auto;margin-right:auto;text-align:center;}
.section-head h2{font-size:clamp(28px,3.6vw,40px);font-weight:700;line-height:1.15;}
.section-head p{margin-top:16px;font-size:17px;color:var(--ink-soft);font-weight:300;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 28px;border-radius:100px;font-weight:600;font-size:15px;transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s,background .35s,color .35s,border-color .35s;white-space:nowrap;}
.btn-primary{background:var(--dark-green);color:var(--white);box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:var(--mid-green);transform:translateY(-3px);box-shadow:var(--shadow-md);}
.btn-gold{background:var(--gold);color:var(--dark-green);box-shadow:var(--shadow-sm);}
.btn-gold:hover{background:#c9b269;transform:translateY(-3px);box-shadow:var(--shadow-md);}
.btn-ghost{background:transparent;color:var(--dark-green);border:1.5px solid var(--dark-green);}
.btn-ghost:hover{background:var(--dark-green);color:var(--white);transform:translateY(-3px);}
.btn-sm{padding:11px 20px;font-size:13.5px;}
/* header */
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 0;transition:background .4s ease,box-shadow .4s ease,padding .4s ease;background:rgba(255,255,255,.0);}
header.solid, header.scrolled{background:rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 6px 24px rgba(11,61,46,.08);padding:12px 0;}
.nav-wrap{display:flex;align-items:center;justify-content:space-between;gap:24px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:42px;width:auto;}
nav.menu{display:flex;align-items:center;gap:34px;}
nav.menu a{font-weight:500;font-size:14.5px;color:var(--ink);position:relative;padding:4px 0;}
nav.menu a.active{color:var(--mid-green);font-weight:600;}
nav.menu a::after{content:'';position:absolute;left:0;bottom:-2px;width:0;height:2px;background:var(--gold);transition:width .3s ease;}
nav.menu a:hover::after{width:100%;}
.header-right{display:flex;align-items:center;gap:18px;}
.burger{display:none;flex-direction:column;gap:5px;width:26px;z-index:120;}
.burger span{height:2px;background:var(--dark-green);border-radius:2px;transition:.3s;}
/* reveal */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1;transform:translateY(0);}
.stagger .reveal:nth-child(1){transition-delay:.05s;} .stagger .reveal:nth-child(2){transition-delay:.12s;}
.stagger .reveal:nth-child(3){transition-delay:.19s;} .stagger .reveal:nth-child(4){transition-delay:.26s;}
/* benefit cards */
.cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.benefit-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:32px 24px;box-shadow:var(--shadow-sm);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;}
.benefit-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);border-color:transparent;}
.icon-badge{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--mid-green),var(--dark-green));margin-bottom:18px;}
.icon-badge svg{width:23px;height:23px;stroke:var(--white);fill:none;}
.benefit-card h3{font-size:17.5px;font-weight:700;margin-bottom:9px;}
.benefit-card p{color:var(--ink-soft);font-size:14.5px;font-weight:300;}
/* blog cards */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.blog-card{border-radius:var(--radius);overflow:hidden;background:var(--white);border:1px solid var(--line);box-shadow:var(--shadow-sm);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;display:flex;flex-direction:column;}
.blog-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);}
.blog-thumb{aspect-ratio:16/10;width:100%;}
.blog-body{padding:24px 22px 26px;display:flex;flex-direction:column;flex:1;}
.tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mid-green);background:rgba(30,122,74,.08);padding:5px 12px;border-radius:100px;}
.meta-row{display:flex;align-items:center;gap:10px;margin:14px 0 12px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;}
.meta-row .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft);}
.blog-body h3{font-size:18.5px;font-weight:700;line-height:1.35;margin-bottom:10px;}
.blog-body p.excerpt{color:var(--ink-soft);font-size:14px;font-weight:300;margin-bottom:18px;flex:1;}
.read-link{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:var(--dark-green);}
.read-link svg{width:15px;height:15px;transition:transform .3s;}
.blog-card:hover .read-link svg{transform:translateX(5px);}
.section-cta-row{display:flex;justify-content:center;margin-top:46px;}
/* about */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.about-copy p{color:var(--ink-soft);font-size:17px;font-weight:300;margin-bottom:18px;}
.about-pillars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px;}
.pillar{display:flex;gap:12px;align-items:flex-start;}
.pillar svg{width:20px;height:20px;stroke:var(--mid-green);flex-shrink:0;margin-top:2px;}
.pillar span{font-size:14px;font-weight:500;color:var(--dark-green);}
.about-art{border-radius:var(--radius);overflow:hidden;aspect-ratio:1/1;}
/* newsletter */
.newsletter{background:linear-gradient(120deg,var(--dark-green),#0F4C38 60%,var(--mid-green));border-radius:28px;padding:64px 56px;position:relative;overflow:hidden;display:grid;grid-template-columns:1.1fr .9fr;gap:36px;align-items:center;}
.newsletter::before{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(216,194,122,.20),transparent 70%);top:-140px;right:-100px;}
.newsletter h2{color:var(--white);font-size:clamp(24px,3.2vw,34px);font-weight:700;position:relative;}
.newsletter p{color:rgba(255,255,255,.78);margin-top:12px;font-weight:300;font-size:15px;max-width:420px;position:relative;}
.newsletter-form{position:relative;display:flex;gap:12px;flex-wrap:wrap;}
.newsletter-form input{flex:1;min-width:210px;padding:15px 20px;border-radius:100px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08);color:var(--white);font-family:var(--ff-body);font-size:14.5px;}
.newsletter-form input::placeholder{color:rgba(255,255,255,.6);}
.newsletter-form input:focus{outline:2px solid var(--gold);outline-offset:2px;background:rgba(255,255,255,.14);}
/* footer */
footer{background:#082A20;color:rgba(255,255,255,.72);padding-top:70px;}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,.1);}
.footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.footer-logo img{height:34px;filter:brightness(0) invert(1);opacity:.95;}
.footer-col h4{color:var(--white);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;}
.footer-col ul li{margin-bottom:11px;}
.footer-col a{font-size:14px;color:rgba(255,255,255,.68);transition:color .25s;}
.footer-col a:hover{color:var(--gold);}
.footer-desc{font-size:14px;color:rgba(255,255,255,.6);max-width:280px;font-weight:300;}
.social-row{display:flex;gap:12px;margin-top:18px;}
.social-row a{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;transition:background .25s;}
.social-row a:hover{background:var(--mid-green);}
.social-row svg{width:16px;height:16px;stroke:var(--white);fill:none;}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding:24px 0;font-size:13px;color:rgba(255,255,255,.5);flex-wrap:wrap;gap:12px;}
.footer-legal{display:flex;gap:22px;}
.footer-legal a{color:rgba(255,255,255,.5);}
.footer-legal a:hover{color:var(--gold);}
/* article page */
.article-hero{padding:170px 0 50px;background:linear-gradient(180deg,#FFFFFF 0%,#FBFAF5 100%);}
.article-hero .container{max-width:820px;}
.breadcrumb{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
.breadcrumb a{color:var(--mid-green);font-weight:500;}
.article-hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.18;margin:14px 0 20px;}
.article-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13.5px;color:var(--ink-soft);align-items:center;}
.article-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft);}
.article-cover{max-width:820px;margin:36px auto 0;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/8;}
.article-body-wrap{padding:56px 0 100px;}
.article-body-wrap .container{max-width:760px;}
.prose h2{font-size:26px;font-weight:700;margin:42px 0 16px;}
.prose h3{font-size:19px;font-weight:700;margin:28px 0 12px;color:var(--mid-green);}
.prose p{font-size:16.5px;color:var(--ink-soft);margin-bottom:18px;font-weight:300;}
.prose ul{margin:0 0 20px 0;}
.prose li{font-size:16px;color:var(--ink-soft);margin-bottom:10px;padding-left:26px;position:relative;font-weight:300;}
.prose li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;background:var(--light-green);}
.callout{background:var(--cream);border-left:3px solid var(--gold);border-radius:12px;padding:20px 24px;margin:26px 0;font-size:15px;color:var(--dark-green);font-weight:500;}
.faq-block{margin-top:16px;border-top:1px solid var(--line);}
.faq-item{border-bottom:1px solid var(--line);}
.faq-q{width:100%;text-align:left;padding:20px 4px;display:flex;justify-content:space-between;align-items:center;gap:16px;background:none;font-family:var(--ff-display);font-weight:600;font-size:15.5px;color:var(--dark-green);}
.faq-q svg{width:18px;height:18px;flex-shrink:0;transition:transform .3s;stroke:var(--mid-green);}
.faq-item.open .faq-q svg{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.faq-item.open .faq-a{max-height:400px;}
.faq-a p{padding:0 4px 20px;font-size:15px;color:var(--ink-soft);font-weight:300;}
.article-cta{background:var(--dark-green);border-radius:var(--radius);padding:36px 32px;margin-top:56px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;}
.article-cta h4{color:var(--white);font-size:19px;margin-bottom:6px;}
.article-cta p{color:rgba(255,255,255,.7);font-size:14px;font-weight:300;}
.author-box{display:flex;align-items:center;gap:14px;margin-top:50px;padding-top:30px;border-top:1px solid var(--line);}
.author-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--mid-green),var(--dark-green));display:flex;align-items:center;justify-content:center;color:var(--white);font-family:var(--ff-display);font-weight:700;flex-shrink:0;}
.author-box b{font-size:14.5px;color:var(--dark-green);display:block;}
.author-box span{font-size:13px;color:var(--ink-soft);}
/* responsive */
@media (max-width:1024px){
  .cards-4{grid-template-columns:repeat(2,1fr);}
  .blog-grid{grid-template-columns:repeat(2,1fr);}
  .about-grid{grid-template-columns:1fr;}
  .about-art{order:-1;max-width:440px;margin:0 auto;}
  .footer-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:760px){
  .section{padding:70px 0;}
  nav.menu{position:fixed;inset:0;top:0;background:var(--dark-green);flex-direction:column;justify-content:center;align-items:center;gap:32px;transform:translateX(100%);transition:transform .45s cubic-bezier(.2,.8,.2,1);z-index:110;}
  nav.menu.open{transform:translateX(0);}
  nav.menu a{color:var(--white);font-size:19px;}
  nav.menu a.active{color:var(--gold);}
  .header-right .btn{display:none;}
  .burger{display:flex;}
  .cards-4, .blog-grid{grid-template-columns:1fr;}
  .newsletter{grid-template-columns:1fr;padding:40px 24px;}
  .footer-grid{grid-template-columns:1fr 1fr;gap:28px;}
  .container{padding:0 22px;}
  .article-hero{padding-top:140px;}
  .article-cta{flex-direction:column;align-items:flex-start;}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
</style>

</head>

<style>
:root{
  --dark-green:#0B3D2E; --mid-green:#1E7A4A; --light-green:#5FBF72;
  --gold:#D8C27A; --white:#FFFFFF; --cream:#F6F4EC; --ink:#0C241C;
  --ink-soft:#4B5E56; --line:#E4E1D4;
  --shadow-sm:0 2px 10px rgba(11,61,46,.06); --shadow-md:0 14px 40px rgba(11,61,46,.10);
  --shadow-lg:0 24px 60px rgba(11,61,46,.16);
  --radius:20px; --radius-sm:12px;
  --ff-display:'Montserrat',sans-serif; --ff-body:'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;scroll-behavior:auto !important;}}
body{font-family:var(--ff-body);color:var(--ink);background:var(--white);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img,svg{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
button{font-family:inherit;cursor:pointer;border:none;}
h1,h2,h3,h4{font-family:var(--ff-display);color:var(--dark-green);letter-spacing:-0.01em;}
.container{max-width:1200px;margin:0 auto;padding:0 32px;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid-green);margin-bottom:14px;}
.eyebrow::before{content:'';width:22px;height:2px;background:var(--gold);display:inline-block;border-radius:2px;}
.section{padding:100px 0;}
.section-cream{background:var(--cream);}
.section-head{max-width:640px;margin-bottom:52px;}
.section-head.center{margin-left:auto;margin-right:auto;text-align:center;}
.section-head h2{font-size:clamp(28px,3.6vw,40px);font-weight:700;line-height:1.15;}
.section-head p{margin-top:16px;font-size:17px;color:var(--ink-soft);font-weight:300;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 28px;border-radius:100px;font-weight:600;font-size:15px;transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s,background .35s,color .35s,border-color .35s;white-space:nowrap;}
.btn-primary{background:var(--dark-green);color:var(--white);box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:var(--mid-green);transform:translateY(-3px);box-shadow:var(--shadow-md);}
.btn-gold{background:var(--gold);color:var(--dark-green);box-shadow:var(--shadow-sm);}
.btn-gold:hover{background:#c9b269;transform:translateY(-3px);box-shadow:var(--shadow-md);}
.btn-ghost{background:transparent;color:var(--dark-green);border:1.5px solid var(--dark-green);}
.btn-ghost:hover{background:var(--dark-green);color:var(--white);transform:translateY(-3px);}
.btn-sm{padding:11px 20px;font-size:13.5px;}
/* header */
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 0;transition:background .4s ease,box-shadow .4s ease,padding .4s ease;background:rgba(255,255,255,.0);}
header.solid, header.scrolled{background:rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 6px 24px rgba(11,61,46,.08);padding:12px 0;}
.nav-wrap{display:flex;align-items:center;justify-content:space-between;gap:24px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:42px;width:auto;}
nav.menu{display:flex;align-items:center;gap:34px;}
nav.menu a{font-weight:500;font-size:14.5px;color:var(--ink);position:relative;padding:4px 0;}
nav.menu a.active{color:var(--mid-green);font-weight:600;}
nav.menu a::after{content:'';position:absolute;left:0;bottom:-2px;width:0;height:2px;background:var(--gold);transition:width .3s ease;}
nav.menu a:hover::after{width:100%;}
.header-right{display:flex;align-items:center;gap:18px;}
.burger{display:none;flex-direction:column;gap:5px;width:26px;z-index:120;}
.burger span{height:2px;background:var(--dark-green);border-radius:2px;transition:.3s;}
/* reveal */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1;transform:translateY(0);}
.stagger .reveal:nth-child(1){transition-delay:.05s;} .stagger .reveal:nth-child(2){transition-delay:.12s;}
.stagger .reveal:nth-child(3){transition-delay:.19s;} .stagger .reveal:nth-child(4){transition-delay:.26s;}
/* benefit cards */
.cards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.benefit-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:32px 24px;box-shadow:var(--shadow-sm);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;}
.benefit-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);border-color:transparent;}
.icon-badge{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--mid-green),var(--dark-green));margin-bottom:18px;}
.icon-badge svg{width:23px;height:23px;stroke:var(--white);fill:none;}
.benefit-card h3{font-size:17.5px;font-weight:700;margin-bottom:9px;}
.benefit-card p{color:var(--ink-soft);font-size:14.5px;font-weight:300;}
/* blog cards */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.blog-card{border-radius:var(--radius);overflow:hidden;background:var(--white);border:1px solid var(--line);box-shadow:var(--shadow-sm);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;display:flex;flex-direction:column;}
.blog-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);}
.blog-thumb{aspect-ratio:16/10;width:100%;}
.blog-body{padding:24px 22px 26px;display:flex;flex-direction:column;flex:1;}
.tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mid-green);background:rgba(30,122,74,.08);padding:5px 12px;border-radius:100px;}
.meta-row{display:flex;align-items:center;gap:10px;margin:14px 0 12px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;}
.meta-row .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft);}
.blog-body h3{font-size:18.5px;font-weight:700;line-height:1.35;margin-bottom:10px;}
.blog-body p.excerpt{color:var(--ink-soft);font-size:14px;font-weight:300;margin-bottom:18px;flex:1;}
.read-link{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:var(--dark-green);}
.read-link svg{width:15px;height:15px;transition:transform .3s;}
.blog-card:hover .read-link svg{transform:translateX(5px);}
.section-cta-row{display:flex;justify-content:center;margin-top:46px;}
/* about */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.about-copy p{color:var(--ink-soft);font-size:17px;font-weight:300;margin-bottom:18px;}
.about-pillars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px;}
.pillar{display:flex;gap:12px;align-items:flex-start;}
.pillar svg{width:20px;height:20px;stroke:var(--mid-green);flex-shrink:0;margin-top:2px;}
.pillar span{font-size:14px;font-weight:500;color:var(--dark-green);}
.about-art{border-radius:var(--radius);overflow:hidden;aspect-ratio:1/1;}
/* newsletter */
.newsletter{background:linear-gradient(120deg,var(--dark-green),#0F4C38 60%,var(--mid-green));border-radius:28px;padding:64px 56px;position:relative;overflow:hidden;display:grid;grid-template-columns:1.1fr .9fr;gap:36px;align-items:center;}
.newsletter::before{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(216,194,122,.20),transparent 70%);top:-140px;right:-100px;}
.newsletter h2{color:var(--white);font-size:clamp(24px,3.2vw,34px);font-weight:700;position:relative;}
.newsletter p{color:rgba(255,255,255,.78);margin-top:12px;font-weight:300;font-size:15px;max-width:420px;position:relative;}
.newsletter-form{position:relative;display:flex;gap:12px;flex-wrap:wrap;}
.newsletter-form input{flex:1;min-width:210px;padding:15px 20px;border-radius:100px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.08);color:var(--white);font-family:var(--ff-body);font-size:14.5px;}
.newsletter-form input::placeholder{color:rgba(255,255,255,.6);}
.newsletter-form input:focus{outline:2px solid var(--gold);outline-offset:2px;background:rgba(255,255,255,.14);}
/* footer */
footer{background:#082A20;color:rgba(255,255,255,.72);padding-top:70px;}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,.1);}
.footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.footer-logo img{height:34px;filter:brightness(0) invert(1);opacity:.95;}
.footer-col h4{color:var(--white);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;}
.footer-col ul li{margin-bottom:11px;}
.footer-col a{font-size:14px;color:rgba(255,255,255,.68);transition:color .25s;}
.footer-col a:hover{color:var(--gold);}
.footer-desc{font-size:14px;color:rgba(255,255,255,.6);max-width:280px;font-weight:300;}
.social-row{display:flex;gap:12px;margin-top:18px;}
.social-row a{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;transition:background .25s;}
.social-row a:hover{background:var(--mid-green);}
.social-row svg{width:16px;height:16px;stroke:var(--white);fill:none;}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding:24px 0;font-size:13px;color:rgba(255,255,255,.5);flex-wrap:wrap;gap:12px;}
.footer-legal{display:flex;gap:22px;}
.footer-legal a{color:rgba(255,255,255,.5);}
.footer-legal a:hover{color:var(--gold);}
/* article page */
.article-hero{padding:170px 0 50px;background:linear-gradient(180deg,#FFFFFF 0%,#FBFAF5 100%);}
.article-hero .container{max-width:820px;}
.breadcrumb{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
.breadcrumb a{color:var(--mid-green);font-weight:500;}
.article-hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.18;margin:14px 0 20px;}
.article-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13.5px;color:var(--ink-soft);align-items:center;}
.article-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft);}
.article-cover{max-width:820px;margin:36px auto 0;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/8;}
.article-body-wrap{padding:56px 0 100px;}
.article-body-wrap .container{max-width:760px;}
.prose h2{font-size:26px;font-weight:700;margin:42px 0 16px;}
.prose h3{font-size:19px;font-weight:700;margin:28px 0 12px;color:var(--mid-green);}
.prose p{font-size:16.5px;color:var(--ink-soft);margin-bottom:18px;font-weight:300;}
.prose ul{margin:0 0 20px 0;}
.prose li{font-size:16px;color:var(--ink-soft);margin-bottom:10px;padding-left:26px;position:relative;font-weight:300;}
.prose li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;background:var(--light-green);}
.callout{background:var(--cream);border-left:3px solid var(--gold);border-radius:12px;padding:20px 24px;margin:26px 0;font-size:15px;color:var(--dark-green);font-weight:500;}
.faq-block{margin-top:16px;border-top:1px solid var(--line);}
.faq-item{border-bottom:1px solid var(--line);}
.faq-q{width:100%;text-align:left;padding:20px 4px;display:flex;justify-content:space-between;align-items:center;gap:16px;background:none;font-family:var(--ff-display);font-weight:600;font-size:15.5px;color:var(--dark-green);}
.faq-q svg{width:18px;height:18px;flex-shrink:0;transition:transform .3s;stroke:var(--mid-green);}
.faq-item.open .faq-q svg{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.faq-item.open .faq-a{max-height:400px;}
.faq-a p{padding:0 4px 20px;font-size:15px;color:var(--ink-soft);font-weight:300;}
.article-cta{background:var(--dark-green);border-radius:var(--radius);padding:36px 32px;margin-top:56px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;}
.article-cta h4{color:var(--white);font-size:19px;margin-bottom:6px;}
.article-cta p{color:rgba(255,255,255,.7);font-size:14px;font-weight:300;}
.author-box{display:flex;align-items:center;gap:14px;margin-top:50px;padding-top:30px;border-top:1px solid var(--line);}
.author-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--mid-green),var(--dark-green));display:flex;align-items:center;justify-content:center;color:var(--white);font-family:var(--ff-display);font-weight:700;flex-shrink:0;}
.author-box b{font-size:14.5px;color:var(--dark-green);display:block;}
.author-box span{font-size:13px;color:var(--ink-soft);}
/* responsive */
@media (max-width:1024px){
  .cards-4{grid-template-columns:repeat(2,1fr);}
  .blog-grid{grid-template-columns:repeat(2,1fr);}
  .about-grid{grid-template-columns:1fr;}
  .about-art{order:-1;max-width:440px;margin:0 auto;}
  .footer-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:760px){
  .section{padding:70px 0;}
  nav.menu{position:fixed;inset:0;top:0;background:var(--dark-green);flex-direction:column;justify-content:center;align-items:center;gap:32px;transform:translateX(100%);transition:transform .45s cubic-bezier(.2,.8,.2,1);z-index:110;}
  nav.menu.open{transform:translateX(0);}
  nav.menu a{color:var(--white);font-size:19px;}
  nav.menu a.active{color:var(--gold);}
  .header-right .btn{display:none;}
  .burger{display:flex;}
  .cards-4, .blog-grid{grid-template-columns:1fr;}
  .newsletter{grid-template-columns:1fr;padding:40px 24px;}
  .footer-grid{grid-template-columns:1fr 1fr;gap:28px;}
  .container{padding:0 22px;}
  .article-hero{padding-top:140px;}
  .article-cta{flex-direction:column;align-items:flex-start;}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
</style>

</head>
