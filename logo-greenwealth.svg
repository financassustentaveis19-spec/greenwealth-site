<svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ícone da planta -->
  <g transform="translate(40, 25)">
    <!-- Folhas externas -->
    <path d="M 20 30 Q 10 20 15 10 Q 25 15 20 30" fill="#5FBF72"/>
    <path d="M 30 30 Q 40 20 35 10 Q 25 15 30 30" fill="#1E7A4A"/>
    
    <!-- Talo central -->
    <path d="M 25 30 Q 25 45 25 55" stroke="#1E7A4A" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Folhas superiores -->
    <path d="M 20 35 Q 5 35 5 20" fill="#5FBF72" opacity="0.8"/>
    <path d="M 30 35 Q 45 35 45 20" fill="#1E7A4A" opacity="0.8"/>
    
    <!-- Círculo decorativo -->
    <circle cx="25" cy="50" r="15" stroke="#D8C27A" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Texto GreenWealth -->
  <text x="85" y="50" font-family="Montserrat, sans-serif" font-size="20" font-weight="700" fill="#0B3D2E">
    Green<tspan fill="#D8C27A">wealth</tspan>
  </text>
</svg>